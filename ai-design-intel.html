<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Monday</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --bg-card: #ffffff;
      --text: #000000;
      --muted: #6b7280;
      --border: rgba(0, 0, 0, 0.08);
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --accent-soft: rgba(20, 184, 166, 0.12);
      --accent-glow: rgba(20, 184, 166, 0.3);
      --radius: 12px;
      --radius-lg: 16px;
      --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.04);
      --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.08);
      --max: 1440px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #ffffff;
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      top: 0;
      width: 50vw;
      max-width: 720px;
      height: 100vh;
      background-repeat: no-repeat;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      left: 0;
      background-image: url("assets/landing-page-left-bg-de65d777-6fa4-4b98-9e60-a995761b40e5.png");
      background-position: right center;
      background-size: cover;
    }

    body::after {
      right: 0;
      background-image: url("assets/landing-page-right-bg-5c0087ae-96a2-44f3-800f-4b0f3da7b3b4.png");
      background-position: left center;
      background-size: cover;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 48px 24px 64px;
      position: relative;
      z-index: 1;
    }

    header.top {
      text-align: center;
      padding: 48px 24px 56px;
      margin-bottom: 32px;
    }

    header.top h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      color: #000000;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    header.top .slogan {
      font-size: 1.1rem;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 8px;
    }

    header.top .sub {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .toolbar label {
      font-size: 0.8rem;
      color: var(--muted);
    }

    select, button {
      font: inherit;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      padding: 8px 14px;
      color: var(--text);
      transition: all 0.2s ease;
    }

    select:hover, button:not(.primary):hover {
      border-color: rgba(20, 184, 166, 0.4);
    }

    button.primary {
      background: linear-gradient(135deg, #14b8a6 0%, #0d9488 50%, #0f766e 100%);
      color: #fff;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 14px var(--accent-glow);
      font-weight: 600;
    }

    button.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--accent-glow);
      background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .tabs button {
      position: relative;
      border: none;
      background: #000000;
      color: #ffffff;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 12px 24px;
      border-radius: 999px;
      transition: all 0.2s ease;
      box-shadow: 0 0 0 1px transparent;
    }

    .tabs button::after {
      content: "";
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 20px;
      background: linear-gradient(90deg, #a855f7 0%, #3b82f6 50%, #22c55e 100%);
      filter: blur(12px);
      opacity: 0.6;
      border-radius: 50%;
      pointer-events: none;
    }

    .tabs button:hover {
      transform: translateY(-1px);
    }

    .tabs button:hover::after {
      opacity: 0.8;
    }

    .tabs button.active {
      background: #000000;
      color: #ffffff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.1), 0 4px 20px rgba(168, 85, 247, 0.25);
    }

    .tabs button.active::after {
      opacity: 0.9;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .banner {
      background: linear-gradient(135deg, var(--accent-soft) 0%, rgba(20, 184, 166, 0.05) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 0.92rem;
    }

    .banner strong {
      color: var(--accent);
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    @media (min-width: 720px) {
      .grid.cols-2 {
        grid-template-columns: repeat(2, 1fr);
      }
      .grid.cols-3 {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .grid.cols-3-tools {
      grid-template-columns: repeat(3, 1fr);
    }
    @media (max-width: 1024px) {
      .grid.cols-3-tools {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 600px) {
      .grid.cols-3-tools {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: var(--shadow-card);
      transition: all 0.25s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
      border-color: rgba(0, 0, 0, 0.12);
      transform: translateY(-2px);
    }

    .card h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.35;
    }

    .card .meta {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-bottom: 8px;
    }

    .card p.summary {
      font-size: 0.88rem;
      color: #334155;
      margin-bottom: 10px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .tag {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(20, 184, 166, 0.1);
      border: 1px solid rgba(20, 184, 166, 0.2);
      color: var(--accent);
    }

    .tag.alert {
      background: #fef2f2;
      border-color: #fecaca;
      color: #b91c1c;
    }

    a.link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    a.link:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .thumb {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
      background: linear-gradient(135deg, #ccfbf1 0%, #99f6e4 100%);
      margin-bottom: 10px;
    }

    .thumb-placeholder {
      background: linear-gradient(135deg, #ccfbf1 0%, #99f6e4 100%) !important;
    }

    .thumb-16x9 {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 10px;
      background: linear-gradient(135deg, #ccfbf1 0%, #99f6e4 100%);
    }

    .thumb-16x9-wrap {
      margin-bottom: 12px;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .thumb-16x9-wrap .thumb-fallback {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      display: flex;
      background: linear-gradient(135deg, #ccfbf1 0%, #99f6e4 100%);
    }

    .card-tool .thumb-16x9-wrap {
      margin-bottom: 12px;
    }

    .card-plugin {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .card-plugin .plugin-icon {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      border-radius: 12px;
      object-fit: contain;
      background: linear-gradient(135deg, #f0fdfa 0%, #ccfbf1 100%);
      border: 1px solid var(--border);
      padding: 6px;
    }

    .card-plugin .plugin-body {
      flex: 1;
      min-width: 0;
    }

    .section-title {
      font-size: 1.08rem;
      font-weight: 700;
      margin: 28px 0 14px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .section-title:first-of-type {
      margin-top: 0;
    }

    .h-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .h-scroll .card {
      flex: 0 0 min(280px, 85vw);
      scroll-snap-align: start;
    }

    .platform-block {
      margin-bottom: 28px;
      scroll-margin-top: 12px;
    }

    .platform-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 5;
      background: #ffffff;
      padding: 10px 0;
    }

    .platform-tabs button {
      font: inherit;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text);
      transition: all 0.2s ease;
    }

    .platform-tabs button:hover {
      border-color: rgba(20, 184, 166, 0.5);
      color: var(--accent);
    }

    .platform-tabs button.active {
      background: linear-gradient(135deg, var(--accent-soft) 0%, rgba(20, 184, 166, 0.08) 100%);
      color: var(--accent);
      border-color: rgba(20, 184, 166, 0.4);
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(20, 184, 166, 0.2);
    }

    .platform-block h4 {
      font-size: 0.95rem;
      margin-bottom: 10px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .platform-block h4 span {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
    }

    .stat {
      font-variant-numeric: tabular-nums;
    }

    .overview-kpis {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .kpi {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .kpi .num {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .kpi .lbl {
      font-size: 0.8rem;
      color: var(--muted);
    }

    table.rank {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    table.rank th,
    table.rank td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    table.rank th {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 0.85rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 100;
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .toast.show {
      opacity: 1;
    }

    footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    @media print {
      .tabs, .toolbar, button, .toast {
        display: none !important;
      }
      .panel {
        display: block !important;
      }
      body {
        background: #fff;
      }
      .card {
        break-inside: avoid;
        box-shadow: none;
        transform: none !important;
      }
      .card:hover {
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <h1>AI Monday</h1>
      <p class="slogan">每周解锁 AI 设计新风向</p>
      <p class="sub" id="weekLine">加载中…</p>
      <div class="toolbar" style="margin-top:24px;justify-content:center;flex-wrap:wrap;gap:12px">
        <div>
          <label for="weekSelect" style="font-size:0.8rem;color:var(--muted)">历史周报</label>
          <select id="weekSelect" aria-label="选择周报周次" style="margin-left:6px">
            <option value="2026-W12">2026-W12</option>
            <option value="2026-W11">2026-W11</option>
          </select>
        </div>
        <div>
          <label for="sortSelect" style="font-size:0.8rem;color:var(--muted)">排序</label>
          <select id="sortSelect" aria-label="排序方式" style="margin-left:6px">
            <option value="heat">按热度</option>
            <option value="date">按日期</option>
          </select>
        </div>
        <button type="button" class="primary" id="btnPdf">导出 PDF</button>
      </div>
    </header>

    <div class="tabs" role="tablist" aria-label="周报板块">
      <button type="button" class="tab" data-tab="trends" role="tab">AI 趋势</button>
      <button type="button" class="tab active" data-tab="tools" role="tab" aria-selected="true">AI 工具</button>
      <button type="button" class="tab" data-tab="hot" role="tab">设计博主</button>
    </div>

    <div id="banner" class="banner" hidden></div>

    <section id="panel-tools" class="panel active" role="tabpanel"></section>
    <section id="panel-hot" class="panel" role="tabpanel"></section>
    <section id="panel-trends" class="panel" role="tabpanel"></section>

    <footer>
      纯静态页面 · 数据来自 <code>data/YYYY-WNN.json</code> · 本地请用 HTTP 服务打开以自动加载 JSON（如 <code>npx serve</code>）
    </footer>
  </div>

  <div id="toast" class="toast" role="status"></div>

  <script>
    const PLATFORMS_HOT = ["YouTube", "Twitter/X", "小红书", "哔哩哔哩"];
    const PLATFORM_IDS = { "YouTube": "youtube", "Twitter/X": "twitter", "小红书": "xiaohongshu", "哔哩哔哩": "bilibili" };

    const FALLBACK = {
      week: "2026-W12",
      dateRange: "2026-03-17 ~ 2026-03-23",
      toolUpdates: [
        {
          title: "Figma AI 积分策略更新（示例）",
          platform: "官方",
          author: "Figma",
          date: "2026-03-18",
          likes: 0,
          favorites: 0,
          views: 0,
          url: "https://www.figma.com/blog/",
          tags: ["工具更新"],
          isAlert: true,
          summary: "JSON 未加载时使用内置示例，请通过本地服务器打开以读取 data 目录。",
          category: "existing"
        },
        {
          title: "新 AI 设计工具示例",
          platform: "官网",
          author: "示例",
          date: "2026-03-17",
          likes: 0,
          favorites: 0,
          views: 0,
          url: "https://example.com",
          tags: ["新工具"],
          isAlert: false,
          summary: "fallback 新工具条目。",
          category: "new"
        },
        {
          title: "Figma 插件示例",
          platform: "Figma Community",
          author: "示例",
          date: "2026-03-16",
          likes: 0,
          favorites: 0,
          views: 0,
          url: "https://www.figma.com/community",
          tags: ["Figma", "插件"],
          isAlert: false,
          summary: "fallback 插件条目。",
          category: "plugin"
        }
      ],
      modelUpdates: [],
      trends: [
        {
          title: "优设 / 站酷 / Smashing — 请替换为本周真实链接",
          platform: "优设",
          author: "uisdc",
          date: "2026-03-17",
          likes: 0,
          favorites: 0,
          views: 0,
          url: "https://www.uisdc.com/",
          tags: ["趋势分析"],
          isAlert: false,
          summary: "fallback 数据。"
        }
      ],
      hotContent: PLATFORMS_HOT.map((p, i) => ({
        title: `${p} 热门示例 ${i + 1}`,
        platform: p,
        author: "示例账号",
        date: "2026-03-18",
        likes: 1000 + i * 200,
        favorites: 300,
        views: 20000,
        url: "https://example.com",
        tags: ["教程"],
        isAlert: false,
        summary: "内置 fallback，连接服务器后将被 JSON 覆盖。"
      })),
      creatorRanking: [
        { name: "示例博主", platform: "YouTube", heat: 90, note: "fallback" }
      ]
    };

    let state = {
      data: null,
      tab: "tools"
    };

    function heatScore(item) {
      const l = item.likes || 0;
      const f = item.favorites || 0;
      const v = item.views || 0;
      return l + f * 1.5 + v / 1000;
    }

    function sortItems(items, mode) {
      const copy = [...items];
      if (mode === "date") {
        copy.sort((a, b) => String(b.date).localeCompare(String(a.date)));
      } else {
        copy.sort((a, b) => heatScore(b) - heatScore(a));
      }
      return copy;
    }

    function showToast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => el.classList.remove("show"), 2800);
    }

    function hotContentThumbUrl(item) {
      if (item.thumbnail) return item.thumbnail;
      if (!item.url) return null;
      try {
        const u = new URL(item.url);
        const host = u.hostname || "";
        if (/youtube\.com|youtu\.be/i.test(host)) {
          const match = u.pathname.match(/\/(?:v\/|embed\/|watch\?v=)([a-zA-Z0-9_-]{11})/) || (host.includes("youtu.be") && u.pathname.match(/\/([a-zA-Z0-9_-]{11})/));
          const vid = match ? match[1] : (u.searchParams.get("v") || "");
          if (vid) return "https://img.youtube.com/vi/" + vid + "/hqdefault.jpg";
        }
        if (/bilibili\.com/i.test(host)) {
          const m = item.url.match(/\/video\/(BV[a-zA-Z0-9]+)/);
          if (m) return null;
        }
      } catch (_) {}
      return null;
    }

    function cardHtml(item, opts) {
      const showThumb = opts && opts.thumb;
      const alertTag = item.isAlert
        ? '<span class="tag alert">预警</span>'
        : "";
      let thumb = "";
      if (showThumb) {
        const thumbUrl = hotContentThumbUrl(item);
        const bvMatch = item.url && item.url.match(/\/video\/(BV[a-zA-Z0-9]+)/);
        if (thumbUrl) {
          thumb = `<img class="thumb" src="${escapeAttr(thumbUrl)}" alt="" loading="lazy" onerror="this.style.display='none';var n=this.nextElementSibling;if(n)n.style.display='block'" /><div class="thumb thumb-placeholder" style="display:none"></div>`;
        } else if (bvMatch && item.platform === "哔哩哔哩") {
          thumb = `<div class="thumb" style="position:relative;overflow:hidden"><img class="thumb" data-bvid="${escapeAttr(bvMatch[1])}" alt="" loading="lazy" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" /></div>`;
        } else {
          thumb = '<div class="thumb" aria-hidden="true"></div>';
        }
      }
      const stats = [];
      if (item.likes) stats.push(`赞 <span class="stat">${item.likes}</span>`);
      if (item.favorites) stats.push(`藏 <span class="stat">${item.favorites}</span>`);
      if (item.views) stats.push(`播放 <span class="stat">${item.views}</span>`);
      const tags = (item.tags || [])
        .map((t) => `<span class="tag">${escapeHtml(t)}</span>`)
        .join("");
      return `
        <article class="card">
          ${thumb}
          <h3>${item.isAlert ? "🚨 " : ""}${escapeHtml(item.title)}</h3>
          <div class="meta">
            <span>${escapeHtml(item.platform || "")}</span>
            <span>${escapeHtml(item.author || "")}</span>
            <span>${escapeHtml(item.date || "")}</span>
            ${stats.length ? `<span>${stats.join(" · ")}</span>` : ""}
          </div>
          <div class="tags">${alertTag}${tags}</div>
          <p class="summary">${escapeHtml(item.summary || "")}</p>
          <a class="link" href="${escapeAttr(item.url)}" target="_blank" rel="noopener">原文链接</a>
        </article>
      `;
    }

    function screenshotUrl(item) {
      if (item.thumbnail) return item.thumbnail;
      if (!item.url) return null;
      try {
        const u = new URL(item.url);
        const host = u.hostname || "";
        if (/twitter\.com|x\.com|youtube\.com|youtu\.be|bilibili\.com|xiaohongshu\.com|weixin\.qq\.com|mp\.weixin/i.test(host)) return null;
        const origin = u.origin || (u.protocol + "//" + host);
        return "https://pageshot.site/v1/screenshot?url=" + encodeURIComponent(origin) + "&width=640&height=360&format=webp";
      } catch (_) { return null; }
    }

    function toolCardHtml(item, type) {
      const alertTag = item.isAlert ? '<span class="tag alert">预警</span>' : "";
      const tags = (item.tags || []).map((t) => `<span class="tag">${escapeHtml(t)}</span>`).join("");
      if (type === "plugin") {
        let icon = item.icon || item.thumbnail;
        if (!icon && item.url) {
          try { icon = "https://www.google.com/s2/favicons?domain=" + encodeURIComponent(new URL(item.url).origin) + "&sz=64"; } catch (_) {}
        }
        if (!icon) icon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2364748b'%3E%3Cpath d='M12 2L2 7l10 5 10-5-10-5z'/%3E%3C/svg%3E";
        return `
          <article class="card card-plugin">
            <img class="plugin-icon" src="${escapeAttr(icon)}" alt="" loading="lazy" />
            <div class="plugin-body">
              <h3>${item.isAlert ? "🚨 " : ""}${escapeHtml(item.title)}</h3>
              <div class="meta"><span>${escapeHtml(item.platform || "")}</span><span>${escapeHtml(item.date || "")}</span></div>
              <div class="tags">${alertTag}${tags}</div>
              <p class="summary">${escapeHtml(item.summary || "")}</p>
              <a class="link" href="${escapeAttr(item.url)}" target="_blank" rel="noopener">访问插件</a>
            </div>
          </article>
        `;
      }
      const thumbSrc = screenshotUrl(item);
      const thumb = thumbSrc
        ? `<div class="thumb-16x9-wrap"><img class="thumb-16x9" src="${escapeAttr(thumbSrc)}" alt="" loading="lazy" onerror="this.onerror=null;this.style.display='none';var f=this.nextElementSibling;if(f)f.style.display='flex'" /><div class="thumb-16x9 thumb-fallback" style="display:none;align-items:center;justify-content:center;color:var(--muted);font-size:0.75rem">官网截图</div></div>`
        : `<div class="thumb-16x9-wrap"><div class="thumb-16x9" style="display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.75rem">官网截图</div></div>`;
      return `
        <article class="card card-tool">
          <a href="${escapeAttr(item.url)}" target="_blank" rel="noopener">${thumb}</a>
          <h3>${item.isAlert ? "🚨 " : ""}${escapeHtml(item.title)}</h3>
          <div class="meta"><span>${escapeHtml(item.platform || "")}</span><span>${escapeHtml(item.author || "")}</span><span>${escapeHtml(item.date || "")}</span></div>
          <div class="tags">${alertTag}${tags}</div>
          <p class="summary">${escapeHtml(item.summary || "")}</p>
          <a class="link" href="${escapeAttr(item.url)}" target="_blank" rel="noopener">访问官网</a>
        </article>
      `;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, "&#39;");
    }

    function renderTools() {
      const d = state.data;
      const mode = document.getElementById("sortSelect").value;
      const all = d.toolUpdates || [];
      const newTools = sortItems(all.filter((x) => x.category === "new"), mode);
      const existing = sortItems(all.filter((x) => ["existing", "core"].includes(x.category || "existing")), mode);
      const plugins = sortItems(all.filter((x) => x.category === "plugin"), mode);
      const el = document.getElementById("panel-tools");
      el.innerHTML = `
        <p class="summary" style="margin-bottom:14px;color:var(--muted);font-size:0.9rem;">
          ① 新出现的 AI 设计工具 · ② 已有工具更新 / AI 功能迭代 · ③ 主流设计工具插件（Figma、PS、Sketch 等）。标有 <span class="tag alert" style="display:inline">预警</span> 为重大变更。
        </p>
        <div class="section-title" style="margin-top:0">① 新出现的 AI 设计工具</div>
        <div class="grid cols-3-tools">${newTools.length ? newTools.map((x) => toolCardHtml(x, "tool")).join("") : '<p class="summary" style="color:var(--muted);">本周暂无新工具收录。</p>'}</div>
        <div class="section-title">② 已有设计工具的更新 / AI 功能迭代</div>
        <div class="grid cols-3-tools">${existing.map((x) => toolCardHtml(x, "tool")).join("")}</div>
        <div class="section-title">③ 主流设计工具插件</div>
        <div class="grid cols-3-tools">${plugins.map((x) => toolCardHtml(x, "plugin")).join("")}</div>
      `;
    }

    function fetchBilibiliThumbs(container) {
      if (!container) return;
      container.querySelectorAll("img.thumb[data-bvid]").forEach((img) => {
        const bvid = img.dataset.bvid;
        if (!bvid) return;
        fetch("https://api.bilibili.com/x/web-interface/view?bvid=" + bvid, { mode: "cors" })
          .then((r) => r.json())
          .then((j) => {
            const pic = j?.data?.pic;
            if (pic) { img.src = pic; img.removeAttribute("data-bvid"); }
          })
          .catch(() => {});
      });
    }

    function renderHot() {
      const d = state.data;
      const mode = document.getElementById("sortSelect").value;
      const rows = (d.creatorRanking || []).slice().sort((a, b) => (b.heat || 0) - (a.heat || 0));
      const rankHtml = rows.length
        ? `<div class="card" style="margin-bottom:20px"><div class="section-title" style="margin-top:0">博主榜单 TOP${rows.length}</div><table class="rank"><thead><tr><th>#</th><th>博主/账号</th><th>平台</th><th>热度</th><th>备注</th></tr></thead><tbody>${rows.map((r, i) => `<tr><td>${i + 1}</td><td>${escapeHtml(r.name)}</td><td>${escapeHtml(r.platform)}</td><td class="stat">${r.heat}</td><td>${escapeHtml(r.note || "")}</td></tr>`).join("")}</tbody></table></div>`
        : "";
      const tabsHtml = `
        <div class="platform-tabs" role="tablist" aria-label="平台快速定位">
          ${PLATFORMS_HOT.map((p) => `<button type="button" class="plat-tab" data-plat-id="${PLATFORM_IDS[p]}" role="tab">${escapeHtml(p)}</button>`).join("")}
        </div>
      `;
      const el = document.getElementById("panel-hot");
      let byPlat = {};
      PLATFORMS_HOT.forEach((p) => {
        byPlat[p] = sortItems(
          (d.hotContent || []).filter((x) => x.platform === p),
          mode
        );
      });
      const blocks = PLATFORMS_HOT.map((p) => {
        const list = byPlat[p] || [];
        const pid = PLATFORM_IDS[p];
        return `
          <div class="platform-block" id="plat-${pid}" data-plat="${escapeHtml(p)}">
            <h4>${escapeHtml(p)} <span>共 ${list.length} 条 · 横向滑动</span></h4>
            <div class="h-scroll">
              ${list.map((x) => cardHtml(x, { thumb: true })).join("")}
            </div>
          </div>
        `;
      }).join("");
      el.innerHTML = rankHtml + `<p class="summary" style="margin-bottom:12px;color:var(--muted);font-size:0.9rem;">油管、推特、小红书、哔哩哔哩博主近 7 天热门内容，每平台不少于 6 条，点击上方平台 Tab 快速定位。</p>` + tabsHtml + blocks;
      fetchBilibiliThumbs(el);
      el.querySelectorAll(".plat-tab").forEach((btn) => {
        btn.addEventListener("click", () => {
          el.querySelectorAll(".plat-tab").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          const target = document.getElementById("plat-" + btn.dataset.platId);
          if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });
    }

    function renderTrends() {
      const d = state.data;
      const mode = document.getElementById("sortSelect").value;
      const items = sortItems(d.trends || [], mode);
      document.getElementById("panel-trends").innerHTML = `
        <p class="summary" style="margin-bottom:14px;color:var(--muted);font-size:0.9rem;">
          类似优设主页的最新热门推文，抓取自站酷、优设、微信公众号等平台，每条附原文跳转链接。
        </p>
        <div class="grid cols-2">${items.map((x) => cardHtml(x)).join("")}</div>
      `;
    }

    function renderAll() {
      const d = state.data;
      if (d) document.getElementById("weekLine").textContent = `${d.week} · ${d.dateRange}`;
      renderTools();
      renderHot();
      renderTrends();
    }

    async function loadWeek(weekId) {
      const banner = document.getElementById("banner");
      banner.hidden = true;
      try {
        const res = await fetch(`data/${weekId}.json`, { cache: "no-store" });
        if (!res.ok) throw new Error("bad status");
        state.data = await res.json();
        showToast("已加载 " + weekId + " 数据");
      } catch {
        state.data =
          weekId === FALLBACK.week
            ? FALLBACK
            : {
                week: weekId,
                dateRange: "—",
                toolUpdates: FALLBACK.toolUpdates,
                modelUpdates: [],
                trends: FALLBACK.trends,
                hotContent: FALLBACK.hotContent,
                creatorRanking: []
              };
        banner.hidden = false;
        banner.innerHTML =
          "<strong>提示：</strong>未能通过 fetch 加载 JSON（常见于直接双击打开 HTML）。已显示内置 fallback；在项目根目录运行本地服务器即可加载 <code>data/</code> 下真实数据。";
        showToast("已使用内置 fallback");
      }
      document.getElementById("weekSelect").value = weekId;
      renderAll();
    }

    document.querySelectorAll(".tab").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((b) => {
          b.classList.remove("active");
          b.setAttribute("aria-selected", "false");
        });
        btn.classList.add("active");
        btn.setAttribute("aria-selected", "true");
        state.tab = btn.dataset.tab;
        document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
        document.getElementById("panel-" + state.tab).classList.add("active");
      });
    });

    document.getElementById("weekSelect").addEventListener("change", (e) => {
      loadWeek(e.target.value);
    });

    document.getElementById("sortSelect").addEventListener("change", () => {
      renderTools();
      renderHot();
      renderTrends();
    });

    document.getElementById("btnPdf").addEventListener("click", () => {
      window.print();
    });

    loadWeek("2026-W12");
  </script>
</body>
</html>
