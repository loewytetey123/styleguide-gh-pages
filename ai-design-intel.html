<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>设计周一见 · AI Trends</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --bg-card: #ffffff;
      --text: #000000;
      --muted: #6b7280;
      --border: rgba(0, 0, 0, 0.08);
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --accent-soft: rgba(20, 184, 166, 0.12);
      --accent-glow: rgba(20, 184, 166, 0.3);
      --radius: 10px;
      --radius-lg: 14px;
      --shadow-card: 0 2px 10px rgba(0, 0, 0, 0.04);
      --shadow-hover: 0 10px 32px rgba(0, 0, 0, 0.08);
      --max: 1280px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f9f9fa;
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* 中间 1280px 固定，左右背景固定不随滚动 */
    .landing-area-one {
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .landing-area-left,
    .landing-area-right {
      position: fixed;
      top: 0;
      bottom: 0;
      z-index: 0;
      display: flex;
      align-items: stretch;
      overflow: hidden;
    }

    .landing-area-left {
      left: 0;
      width: max(0px, calc(50% - 640px));
      justify-content: flex-end;
    }

    .landing-area-right {
      right: 0;
      width: max(0px, calc(50% - 640px));
      justify-content: flex-start;
    }

    .landing-area-left img,
    .landing-area-right img {
      width: auto;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .landing-area-left img {
      object-position: right center;
    }

    .landing-area-right img {
      object-position: left center;
    }

    .landing-area-middle {
      flex: 0 1 1280px;
      width: 1280px;
      min-width: 0;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      background: #f9f9fa;
      border-width: 0 1px;
      border-style: solid;
      border-color: rgba(0, 0, 0, 0.08);
      box-sizing: border-box;
      position: relative;
      z-index: 1;
    }

    .wrap {
      flex: 1;
      padding: 80px 24px 80px;
      position: relative;
      box-sizing: border-box;
    }

    header.top {
      text-align: center;
      padding: 0 0 40px;
      margin-bottom: 24px;
    }

    header.top h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      color: #000000;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    header.top h1 .hero-cn {
      font-family: "PingFang SC", "PingFang TC", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      font-weight: 700;
    }

    header.top h1 .hero-en {
      font-family: "Inter", sans-serif;
      font-weight: 700;
    }

    .hero-rotating-wrap {
      min-height: 1.2em;
      margin-bottom: 12px;
    }

    .hero-rotating {
      display: inline-block;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.2;
      background: linear-gradient(90deg, #FF5D8E 0%, #B679FF 50%, #1FC8FF 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      transition: opacity 0.4s ease;
    }

    .hero-rotating.fade {
      opacity: 0;
    }

    header.top .sub {
      color: var(--muted);
      font-size: 0.85rem;
      opacity: 0.7;
    }

    select, button {
      font: inherit;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      padding: 8px 14px;
      color: var(--text);
      transition: all 0.2s ease;
    }

    select:hover, button:not(.primary):hover {
      border-color: rgba(20, 184, 166, 0.4);
    }

    button.primary {
      background: linear-gradient(135deg, #14b8a6 0%, #0d9488 50%, #0f766e 100%);
      color: #fff;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 14px var(--accent-glow);
      font-weight: 600;
    }

    button.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--accent-glow);
      background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: stretch;
      gap: 16px;
      margin-bottom: 48px;
    }

    .tabs button {
      position: relative;
      height: 48px;
      min-width: 144px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      padding: 0 36px;
      border: 1px solid #000000;
      background: transparent;
      color: #000000;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-sizing: border-box;
      overflow: hidden;
    }

    .tabs button .tab-glow,
    .tabs button .tab-mask,
    .tabs button .star {
      display: none;
    }

    .tabs button .tab-text {
      position: relative;
      z-index: 2;
    }

    .tabs button:hover {
      border-color: #333;
      color: #333;
    }

    .tabs button:active {
      transform: scale(0.95);
    }

    .tabs button.active {
      border-color: transparent;
      background: transparent;
      color: #ffffff;
      box-shadow: 0 4px 24px rgba(30, 58, 138, 0.3), 0 0 40px rgba(124, 58, 237, 0.2);
    }

    .tabs button.active .tab-glow,
    .tabs button.active .tab-mask,
    .tabs button.active .star {
      display: block;
    }

    .tabs button.active .tab-glow {
      position: absolute;
      inset: -50%;
      background: conic-gradient(from 0deg, #1e3a8a, #7c3aed, #ffffff, #1e3a8a);
      animation: tab-glow-spin 3s linear infinite;
    }

    .tabs button.active .tab-mask {
      position: absolute;
      inset: 1px;
      background: rgba(0, 0, 0, 0.9);
      border-radius: 999px;
      z-index: 1;
    }

    .tabs button.active .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      z-index: 1;
      animation: star-twinkle 2s ease-in-out infinite;
      animation-delay: calc(var(--delay) * 1s);
    }

    .tabs button.active .star:nth-child(3) { left: 15%; top: 30%; width: 4px; height: 4px; }
    .tabs button.active .star:nth-child(4) { right: 20%; top: 25%; width: 2px; height: 2px; background: #bfdbfe; }
    .tabs button.active .star:nth-child(5) { left: 25%; bottom: 35%; width: 3px; height: 3px; }
    .tabs button.active .star:nth-child(6) { right: 15%; bottom: 30%; width: 2px; height: 2px; background: #bfdbfe; }
    .tabs button.active .star:nth-child(7) { left: calc(50% - 1px); top: 20%; width: 2px; height: 2px; }

    .tabs button.active:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 32px rgba(30, 58, 138, 0.4), 0 0 48px rgba(124, 58, 237, 0.3);
    }

    .tabs button.active:active {
      transform: scale(0.95);
    }

    @keyframes tab-glow-spin {
      to { transform: rotate(360deg); }
    }

    @keyframes star-twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .banner {
      background: linear-gradient(135deg, var(--accent-soft) 0%, rgba(20, 184, 166, 0.05) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .banner strong {
      color: var(--accent);
    }

    .grid {
      display: grid;
      gap: 20px;
    }

    @media (min-width: 720px) {
      .grid.cols-2 {
        grid-template-columns: repeat(2, 1fr);
      }
      .grid.cols-3 {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .grid.cols-3-tools {
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width: 1024px) {
      .grid.cols-3-tools {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 600px) {
      .grid.cols-3-tools {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow-card);
      transition: all 0.25s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
      border-color: rgba(0, 0, 0, 0.12);
      transform: translateY(-2px);
    }

    .card h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .card .meta {
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-bottom: 10px;
    }

    .card p.summary {
      font-size: 0.9rem;
      color: #334155;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .tag {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(20, 184, 166, 0.1);
      border: 1px solid rgba(20, 184, 166, 0.2);
      color: var(--accent);
    }

    .tag.alert {
      background: #fef2f2;
      border-color: #fecaca;
      color: #b91c1c;
    }

    a.link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    a.link:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .thumb {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
      background: linear-gradient(135deg, #ccfbf1 0%, #99f6e4 100%);
      margin-bottom: 12px;
    }

    .thumb-placeholder {
      background: linear-gradient(135deg, #ccfbf1 0%, #99f6e4 100%) !important;
    }

    .thumb-16x9 {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%);
    }

    .thumb-16x9-wrap {
      margin-bottom: 14px;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .thumb-16x9-wrap .thumb-fallback {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%);
    }

    .card-tool .thumb-16x9-wrap {
      margin-bottom: 0;
    }

    /* toools.design 风格：设计工具卡片 */
    .card-tool-wrap {
      position: relative;
    }

    .card-tool {
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
      border-radius: 24px;
      border: none;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      background: #ffffff;
      transition: box-shadow 0.25s ease;
    }

    .card-tool-wrap:hover .card-tool {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    }

    .card-tool > a:first-child {
      flex: 0 0 auto;
      display: block;
      overflow: hidden;
      padding: 14px 14px 0;
    }

    .card-tool .thumb-16x9-wrap {
      border-radius: 16px;
      overflow: hidden;
    }

    .card-tool .thumb-16x9,
    .card-tool .thumb-16x9-wrap .thumb-fallback {
      aspect-ratio: 2.465 / 1;
      border-radius: 16px;
    }

    .card-tool .thumb-16x9-wrap .thumb-fallback {
      background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%);
    }

    .card-tool .thumb-16x9-wrap .thumb-fallback.logo-bg-light {
      background: #ffffff;
    }

    .card-tool .thumb-16x9-wrap .thumb-fallback.logo-bg-dark {
      background: #000000;
    }

    .card-tool .thumb-16x9-wrap .thumb-fallback.logo-bg-dark img {
      filter: brightness(0) invert(1);
    }

    .card-tool .thumb-16x9-wrap .thumb-fallback.logo-bg-gradient {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
    }

    .card-tool .thumb-16x9-wrap .thumb-fallback.logo-bg-gradient img {
      filter: brightness(0) invert(1);
    }

    .card-tool .thumb-16x9-wrap .thumb-fallback .fallback-text {
      color: #6b7280;
    }

    .card-tool .thumb-16x9-wrap .thumb-fallback.logo-bg-dark .fallback-text {
      color: rgba(255,255,255,0.9);
    }

    .card-tool .thumb-16x9-wrap .thumb-fallback.logo-bg-gradient .fallback-text {
      color: rgba(255,255,255,0.9);
    }

    .card-tool .thumb-16x9-wrap .thumb-fallback.thumb-logo-name .tool-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
    }

    .card-tool .thumb-16x9-wrap .thumb-fallback.thumb-logo-name .fallback-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: inherit;
    }

    .card-tool .thumb-16x9-wrap .thumb-fallback.logo-bg-light .fallback-name {
      color: #1f2937;
    }

    .card-tool .card-tool-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      min-height: 0;
    }

    .card-tool .card-tool-body .card-tool-title {
      font-family: "Inter", -apple-system, sans-serif;
      font-weight: 700;
      font-size: 1.125rem;
      line-height: 1.3;
      color: #000000;
      margin-bottom: 10px;
    }

    .card-tool .card-tool-body .card-tool-desc {
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 0.875rem;
      font-weight: 400;
      color: #6b7280;
      line-height: 1.5;
      margin-bottom: 12px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tool .card-tool-body .card-tool-meta {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-bottom: 14px;
    }

    .card-tool .card-tool-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
    }

    .card-tool .card-tool-footer .link {
      font-size: 0.875rem;
    }

    .card-tool .card-tool-footer .tag-pill {
      font-size: 0.7rem;
      padding: 5px 12px;
      border-radius: 999px;
      background: #FEF9C3;
      color: #a16207;
      font-weight: 500;
      margin-left: auto;
    }

    .card-tool .card-tool-footer .tag-pill.alert {
      background: #fef2f2;
      color: #b91c1c;
    }

    .card-plugin {
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }

    .card-plugin .plugin-icon {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: 10px;
      object-fit: contain;
      background: linear-gradient(135deg, #f0fdfa 0%, #ccfbf1 100%);
      border: 1px solid var(--border);
      padding: 6px;
    }

    .card-plugin .plugin-body {
      flex: 1;
      min-width: 0;
    }

    .section-title {
      font-size: 1.125rem;
      font-weight: 700;
      margin: 40px 0 16px;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.35;
    }

    .section-title:first-of-type {
      margin-top: 0;
    }

    .h-scroll {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      padding-bottom: 12px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .h-scroll .card {
      flex: 0 0 min(280px, 85vw);
      scroll-snap-align: start;
    }

    .h-scroll .card-tool-wrap {
      flex: 0 0 min(360px, 85vw);
      scroll-snap-align: start;
    }

    .platform-block {
      margin-bottom: 36px;
      scroll-margin-top: 16px;
    }

    .platform-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      position: sticky;
      top: 0;
      z-index: 5;
      background: #ffffff;
      padding: 14px 0;
    }

    .platform-tabs button {
      font: inherit;
      border: 1px solid #000;
      background: #fff;
      padding: 6px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      color: #000;
      transition: all 0.2s ease;
    }

    .platform-tabs button:hover {
      border-color: #333;
      color: #333;
    }

    .platform-tabs button.active {
      background: #000;
      color: #fff;
      border-color: #000;
      font-weight: 600;
    }

    .platform-block h4 {
      font-size: 1.05rem;
      margin-bottom: 14px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .platform-block h4 span {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
    }

    .stat {
      font-variant-numeric: tabular-nums;
    }

    .overview-kpis {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .kpi {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .kpi .num {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .kpi .lbl {
      font-size: 0.8rem;
      color: var(--muted);
    }

    table.rank {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    table.rank th,
    table.rank td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    table.rank th {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 0.85rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 100;
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .toast.show {
      opacity: 1;
    }

    footer {
      margin-top: 56px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    @media (max-width: 960px) {
      .landing-area-left,
      .landing-area-right {
        display: none;
      }
      .landing-area-middle {
        max-width: 100%;
        border-width: 0;
      }
      .wrap {
        padding: 48px 16px 48px;
      }
    }

    @media print {
      .landing-area-left,
      .landing-area-right {
        display: none !important;
      }
      .landing-area-one {
        display: block !important;
      }
      .tabs, button, .toast {
        display: none !important;
      }
      .panel {
        display: block !important;
      }
      body {
        background: #fff;
      }
      .card {
        break-inside: avoid;
        box-shadow: none;
        transform: none !important;
      }
      .card:hover {
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="landing-area-one">
    <div class="landing-area-left">
      <img src="assets/landing-page-left-bg-de65d777-6fa4-4b98-9e60-a995761b40e5.png" alt="">
    </div>
    <div class="landing-area-middle">
  <div class="wrap">
    <header class="top">
      <h1><span class="hero-cn">设计周一见 · </span><span class="hero-en">AI Trends</span></h1>
      <p class="hero-rotating-wrap"><span id="heroRotating" class="hero-rotating">UI Design</span></p>
      <p class="sub" id="weekLine">加载中…</p>
    </header>

    <div class="tabs" role="tablist" aria-label="周报板块">
      <button type="button" class="tab active" data-tab="hot" role="tab" aria-selected="true">
        <span class="tab-glow"></span>
        <span class="tab-mask"></span>
        <span class="star" style="--delay:0"></span>
        <span class="star" style="--delay:0.2"></span>
        <span class="star" style="--delay:0.4"></span>
        <span class="star" style="--delay:0.6"></span>
        <span class="star" style="--delay:0.8"></span>
        <span class="tab-text">设计博主</span>
      </button>
      <button type="button" class="tab" data-tab="tools" role="tab">
        <span class="tab-glow"></span>
        <span class="tab-mask"></span>
        <span class="star" style="--delay:0"></span>
        <span class="star" style="--delay:0.2"></span>
        <span class="star" style="--delay:0.4"></span>
        <span class="star" style="--delay:0.6"></span>
        <span class="star" style="--delay:0.8"></span>
        <span class="tab-text">设计工具</span>
      </button>
      <button type="button" class="tab" data-tab="trends" role="tab">
        <span class="tab-glow"></span>
        <span class="tab-mask"></span>
        <span class="star" style="--delay:0"></span>
        <span class="star" style="--delay:0.2"></span>
        <span class="star" style="--delay:0.4"></span>
        <span class="star" style="--delay:0.6"></span>
        <span class="star" style="--delay:0.8"></span>
        <span class="tab-text">AI 设计趋势</span>
      </button>
    </div>

    <div id="banner" class="banner" hidden></div>

    <section id="panel-hot" class="panel active" role="tabpanel"></section>
    <section id="panel-tools" class="panel" role="tabpanel"></section>
    <section id="panel-trends" class="panel" role="tabpanel"></section>

    <footer>
      纯静态页面 · 数据来自 <code>data/YYYY-WNN.json</code> · 本地请用 HTTP 服务打开以自动加载 JSON（如 <code>npx serve</code>）
    </footer>
  </div>
    </div>
    <div class="landing-area-right">
      <img src="assets/landing-page-right-bg-5c0087ae-96a2-44f3-800f-4b0f3da7b3b4.png" alt="">
    </div>
  </div>

  <div id="toast" class="toast" role="status"></div>

  <script>
    const PLATFORMS_HOT = ["YouTube", "Twitter/X", "小红书", "哔哩哔哩"];
    const PLATFORM_IDS = { "YouTube": "youtube", "Twitter/X": "twitter", "小红书": "xiaohongshu", "哔哩哔哩": "bilibili" };

    const HERO_ROTATING = ["UI Design", "Web Interface", "App Interface", "SaaS Interface"];
    (function initHeroRotating() {
      const el = document.getElementById("heroRotating");
      if (!el) return;
      let i = 0;
      setInterval(() => {
        el.classList.add("fade");
        setTimeout(() => {
          i = (i + 1) % HERO_ROTATING.length;
          el.textContent = HERO_ROTATING[i];
          el.classList.remove("fade");
        }, 400);
      }, 2500);
    })();

    const FALLBACK = {
      week: "2026-W14",
      dateRange: "2026-03-30 ~ 2026-04-05",
      toolUpdates: [
        {
          title: "Figma AI 积分策略更新（示例）",
          platform: "官方",
          author: "Figma",
          date: "2026-03-18",
          likes: 0,
          favorites: 0,
          views: 0,
          url: "https://www.figma.com/blog/",
          tags: ["工具更新"],
          isAlert: true,
          summary: "JSON 未加载时使用内置示例，请通过本地服务器打开以读取 data 目录。",
          category: "existing"
        },
        {
          title: "新 AI 设计工具示例",
          platform: "官网",
          author: "示例",
          date: "2026-03-17",
          likes: 0,
          favorites: 0,
          views: 0,
          url: "https://example.com",
          tags: ["新工具"],
          isAlert: false,
          summary: "fallback 新工具条目。",
          category: "new"
        },
        {
          title: "Figma 插件示例",
          platform: "Figma Community",
          author: "示例",
          date: "2026-03-16",
          likes: 0,
          favorites: 0,
          views: 0,
          url: "https://www.figma.com/community",
          tags: ["Figma", "插件"],
          isAlert: false,
          summary: "fallback 插件条目。",
          category: "plugin"
        }
      ],
      modelUpdates: [],
      trends: [
        {
          title: "优设 / 站酷 / Smashing — 请替换为本周真实链接",
          platform: "优设",
          author: "uisdc",
          date: "2026-03-17",
          likes: 0,
          favorites: 0,
          views: 0,
          url: "https://www.uisdc.com/",
          tags: ["趋势分析"],
          isAlert: false,
          summary: "fallback 数据。"
        }
      ],
      hotContent: PLATFORMS_HOT.map((p, i) => ({
        title: `${p} 热门示例 ${i + 1}`,
        platform: p,
        author: "示例账号",
        date: "2026-03-18",
        likes: 1000 + i * 200,
        favorites: 300,
        views: 20000,
        url: "https://example.com",
        tags: ["教程"],
        isAlert: false,
        summary: "内置 fallback，连接服务器后将被 JSON 覆盖。"
      })),
      creatorRanking: [
        { name: "示例博主", platform: "YouTube", heat: 90, note: "fallback" }
      ]
    };

    let state = {
      data: null,
      tab: "hot"
    };

    function heatScore(item) {
      const l = item.likes || 0;
      const f = item.favorites || 0;
      const v = item.views || 0;
      return l + f * 1.5 + v / 1000;
    }

    function sortItems(items, mode) {
      const copy = [...items];
      if (mode === "date") {
        copy.sort((a, b) => String(b.date).localeCompare(String(a.date)));
      } else {
        copy.sort((a, b) => heatScore(b) - heatScore(a));
      }
      return copy;
    }

    function showToast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => el.classList.remove("show"), 2800);
    }

    function hotContentThumbUrl(item) {
      if (item.thumbnail) return item.thumbnail;
      if (!item.url) return null;
      try {
        const u = new URL(item.url);
        const host = u.hostname || "";
        if (/youtube\.com|youtu\.be/i.test(host)) {
          const match = u.pathname.match(/\/(?:v\/|embed\/|watch\?v=)([a-zA-Z0-9_-]{11})/) || (host.includes("youtu.be") && u.pathname.match(/\/([a-zA-Z0-9_-]{11})/));
          const vid = match ? match[1] : (u.searchParams.get("v") || "");
          if (vid) return "https://img.youtube.com/vi/" + vid + "/hqdefault.jpg";
        }
        if (/bilibili\.com/i.test(host)) {
          const m = item.url.match(/\/video\/(BV[a-zA-Z0-9]+)/);
          if (m) return null;
        }
      } catch (_) {}
      return null;
    }

    function cardHtml(item, opts) {
      const showThumb = opts && opts.thumb;
      const alertTag = item.isAlert
        ? '<span class="tag alert">预警</span>'
        : "";
      let thumb = "";
      if (showThumb) {
        const thumbUrl = hotContentThumbUrl(item);
        const bvMatch = item.url && item.url.match(/\/video\/(BV[a-zA-Z0-9]+)/);
        const thumbPlaceholder = '<div class="thumb thumb-placeholder" style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--muted);font-size:0.75rem"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>内容预览</div>';
        if (thumbUrl) {
          thumb = `<img class="thumb" src="${escapeAttr(thumbUrl)}" alt="" loading="lazy" onerror="this.style.display='none';var n=this.nextElementSibling;if(n){n.style.display='flex';n.style.flexDirection='column'}"/><div class="thumb thumb-placeholder" style="display:none;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--muted);font-size:0.75rem"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>内容预览</div>`;
        } else if (bvMatch && item.platform === "哔哩哔哩") {
          thumb = `<div class="thumb" style="position:relative;overflow:hidden"><img class="thumb" data-bvid="${escapeAttr(bvMatch[1])}" alt="" loading="lazy" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" /></div>`;
        } else {
          thumb = thumbPlaceholder;
        }
      }
      const stats = [];
      if (item.likes) stats.push(`赞 <span class="stat">${item.likes}</span>`);
      if (item.favorites) stats.push(`藏 <span class="stat">${item.favorites}</span>`);
      if (item.views) stats.push(`播放 <span class="stat">${item.views}</span>`);
      const tags = (item.tags || [])
        .map((t) => `<span class="tag">${escapeHtml(t)}</span>`)
        .join("");
      return `
        <article class="card">
          ${thumb}
          <h3>${item.isAlert ? "🚨 " : ""}${escapeHtml(item.title)}</h3>
          <div class="meta">
            <span>${escapeHtml(item.platform || "")}</span>
            <span>${escapeHtml(item.author || "")}</span>
            <span>${escapeHtml(item.date || "")}</span>
            ${stats.length ? `<span>${stats.join(" · ")}</span>` : ""}
          </div>
          <div class="tags">${alertTag}${tags}</div>
          <p class="summary">${escapeHtml(item.summary || "")}</p>
          <a class="link" href="${escapeAttr(item.url)}" target="_blank" rel="noopener">原文链接</a>
        </article>
      `;
    }

    function screenshotUrl(item) {
      if (item.thumbnail) return item.thumbnail;
      if (!item.url) return null;
      try {
        const u = new URL(item.url);
        const host = u.hostname || "";
        if (/twitter\.com|x\.com|youtube\.com|youtu\.be|bilibili\.com|xiaohongshu\.com|weixin\.qq\.com|mp\.weixin/i.test(host)) return null;
        const origin = u.origin || (u.protocol + "//" + host);
        return "https://pageshot.site/v1/screenshot?url=" + encodeURIComponent(origin) + "&width=640&height=360&format=webp";
      } catch (_) { return null; }
    }

    function toolCardHtml(item, type) {
      const alertTag = item.isAlert ? '<span class="tag alert">预警</span>' : "";
      const tags = (item.tags || []).map((t) => `<span class="tag">${escapeHtml(t)}</span>`).join("");
      if (type === "plugin") {
        let icon = item.icon || item.thumbnail;
        if (!icon && item.url) {
          try { icon = "https://www.google.com/s2/favicons?domain=" + encodeURIComponent(new URL(item.url).origin) + "&sz=64"; } catch (_) {}
        }
        if (!icon) icon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2364748b'%3E%3Cpath d='M12 2L2 7l10 5 10-5-10-5z'/%3E%3C/svg%3E";
        return `
          <article class="card card-plugin">
            <img class="plugin-icon" src="${escapeAttr(icon)}" alt="" loading="lazy" />
            <div class="plugin-body">
              <h3>${item.isAlert ? "🚨 " : ""}${escapeHtml(item.title)}</h3>
              <div class="meta"><span>${escapeHtml(item.platform || "")}</span><span>${escapeHtml(item.date || "")}</span></div>
              <div class="tags">${alertTag}${tags}</div>
              <p class="summary">${escapeHtml(item.summary || "")}</p>
              <a class="link" href="${escapeAttr(item.url)}" target="_blank" rel="noopener">访问插件</a>
            </div>
          </article>
        `;
      }
      const logoName = item.logoName || (() => {
        const t = String(item.title || "");
        const m = t.match(/^([^：:]+)/);
        const part = m ? m[1].trim() : t;
        return part.length > 16 ? (item.author || part.slice(0, 14) + "…") : part || item.author || "";
      })();
      let logoUrl = item.logo || null;
      if (!logoUrl && item.url) {
        try { logoUrl = "https://www.google.com/s2/favicons?domain=" + encodeURIComponent(new URL(item.url).origin) + "&sz=128"; } catch (_) {}
      }
      const logoBg = item.logoBg || "gradient";
      const logoBgClass = ["light", "dark", "gradient"].includes(logoBg) ? " logo-bg-" + logoBg : "";
      const fallbackContent = logoUrl
        ? `<img src="${escapeAttr(logoUrl)}" alt="" class="tool-logo" onerror="this.style.display='none';var n=this.nextElementSibling;if(n)n.style.display='inline'"/><span class="fallback-text fallback-name" style="display:none">${escapeHtml(logoName)}</span>`
        : `<span class="fallback-text fallback-name">${escapeHtml(logoName)}</span>`;
      const thumbFallbackDiv = `<div class="thumb-16x9 thumb-fallback thumb-logo-name${logoBgClass}" style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px">${fallbackContent}</div>`;
      const thumb = `<div class="thumb-16x9-wrap">${thumbFallbackDiv}</div>`;
      const pillTag = item.isAlert ? '<span class="tag-pill alert">预警</span>' : (item.tags && item.tags[0] ? `<span class="tag-pill">${escapeHtml(item.tags[0])}</span>` : "");
      const metaParts = [item.platform, item.author, item.date].filter(Boolean).map((x) => escapeHtml(x));
      return `
        <div class="card-tool-wrap">
          <article class="card card-tool">
            <a href="${escapeAttr(item.url)}" target="_blank" rel="noopener">${thumb}</a>
            <div class="card-tool-body">
              <div class="card-tool-title">${item.isAlert ? "🚨 " : ""}${escapeHtml(item.title)}</div>
              <div class="card-tool-desc">${escapeHtml(item.summary || "")}</div>
              ${metaParts.length ? `<div class="card-tool-meta">${metaParts.join(" · ")}</div>` : ""}
              <div class="card-tool-footer">
                <a class="link" href="${escapeAttr(item.url)}" target="_blank" rel="noopener">访问官网</a>
                ${pillTag}
              </div>
            </div>
          </article>
        </div>
      `;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, "&#39;");
    }

    function renderTools() {
      const d = state.data;
      const mode = document.getElementById("sortSelect")?.value || "heat";
      const all = d.toolUpdates || [];
      const newTools = sortItems(all.filter((x) => x.category === "new"), mode);
      const existing = sortItems(all.filter((x) => ["existing", "core"].includes(x.category || "existing")), mode);
      const plugins = sortItems(all.filter((x) => x.category === "plugin"), mode);
      const el = document.getElementById("panel-tools");
      el.innerHTML = `
        <p class="summary" style="margin-bottom:16px;color:var(--muted);font-size:0.9rem;line-height:1.5;">
          ① 新出现的 AI 设计工具 · ② 已有工具更新 / AI 功能迭代 · ③ 主流设计工具插件（Figma、PS、Sketch 等）。标有 <span class="tag alert" style="display:inline">预警</span> 为重大变更。
        </p>
        <div class="section-title" style="margin-top:0">① 新出现的 AI 设计工具</div>
        <div class="grid cols-3-tools">${newTools.length ? newTools.map((x) => toolCardHtml(x, "tool")).join("") : '<p class="summary" style="color:var(--muted);">本周暂无新工具收录。</p>'}</div>
        <div class="section-title">② 已有设计工具的更新 / AI 功能迭代</div>
        <div class="grid cols-3-tools">${existing.map((x) => toolCardHtml(x, "tool")).join("")}</div>
        <div class="section-title">③ 主流设计工具插件</div>
        <div class="grid cols-3-tools">${plugins.map((x) => toolCardHtml(x, "plugin")).join("")}</div>
      `;
    }

    function fetchBilibiliThumbs(container) {
      if (!container) return;
      container.querySelectorAll("img.thumb[data-bvid]").forEach((img) => {
        const bvid = img.dataset.bvid;
        if (!bvid) return;
        fetch("https://api.bilibili.com/x/web-interface/view?bvid=" + bvid, { mode: "cors" })
          .then((r) => r.json())
          .then((j) => {
            const pic = j?.data?.pic;
            if (pic) { img.src = pic; img.removeAttribute("data-bvid"); }
          })
          .catch(() => {});
      });
    }

    function renderHot() {
      const d = state.data;
      const mode = document.getElementById("sortSelect")?.value || "heat";
      const officialItems = d.officialUpdates && d.officialUpdates.length
        ? sortItems(d.officialUpdates, mode)
        : sortItems(
            (d.toolUpdates || []).filter((x) => ["existing", "core"].includes(x.category || "")),
            mode
          );
      const officialHtml = officialItems.length
        ? `<div class="section-title" style="margin-top:0">设计官方更新</div>
           <p class="summary" style="margin-bottom:14px;color:var(--muted);font-size:0.9rem;line-height:1.5;">Figma、Midjourney、Spline 等在推特、油管等平台的官方更新，横向滑动查看。</p>
           <div class="h-scroll" style="margin-bottom:36px">${officialItems.map((x) => toolCardHtml(x, "tool")).join("")}</div>`
        : "";
      const tabsHtml = `
        <div class="platform-tabs" role="tablist" aria-label="平台快速定位">
          ${PLATFORMS_HOT.map((p) => `<button type="button" class="plat-tab" data-plat-id="${PLATFORM_IDS[p]}" role="tab">${escapeHtml(p)}</button>`).join("")}
        </div>
      `;
      const el = document.getElementById("panel-hot");
      let byPlat = {};
      PLATFORMS_HOT.forEach((p) => {
        byPlat[p] = sortItems(
          (d.hotContent || []).filter((x) => x.platform === p),
          mode
        );
      });
      const blocks = PLATFORMS_HOT.map((p) => {
        const list = byPlat[p] || [];
        const pid = PLATFORM_IDS[p];
        return `
          <div class="platform-block" id="plat-${pid}" data-plat="${escapeHtml(p)}">
            <h4>${escapeHtml(p)} <span>共 ${list.length} 条 · 横向滑动</span></h4>
            <div class="h-scroll">
              ${list.map((x) => cardHtml(x, { thumb: true })).join("")}
            </div>
          </div>
        `;
      }).join("");
      el.innerHTML = officialHtml + `<div class="section-title">设计大Pro</div><p class="summary" style="margin-bottom:14px;color:var(--muted);font-size:0.9rem;line-height:1.5;">油管、推特、小红书、哔哩哔哩博主近 7 天热门内容，点击上方平台 Tab 快速定位。</p>` + tabsHtml + blocks;
      fetchBilibiliThumbs(el);
      el.querySelectorAll(".plat-tab").forEach((btn) => {
        btn.addEventListener("click", () => {
          el.querySelectorAll(".plat-tab").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          const target = document.getElementById("plat-" + btn.dataset.platId);
          if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });
    }

    function renderTrends() {
      const d = state.data;
      const mode = document.getElementById("sortSelect")?.value || "heat";
      const items = sortItems(d.trends || [], mode);
      document.getElementById("panel-trends").innerHTML = `
        <p class="summary" style="margin-bottom:16px;color:var(--muted);font-size:0.9rem;line-height:1.5;">
          类似优设主页的最新热门推文，抓取自站酷、优设、微信公众号等平台，每条附原文跳转链接。
        </p>
        <div class="grid cols-2">${items.map((x) => cardHtml(x)).join("")}</div>
      `;
    }

    function renderAll() {
      const d = state.data;
      if (d) document.getElementById("weekLine").textContent = `${d.week} · ${d.dateRange}`;
      renderTools();
      renderHot();
      renderTrends();
    }

    async function loadWeek(weekId) {
      const banner = document.getElementById("banner");
      banner.hidden = true;
      try {
        const res = await fetch(`data/${weekId}.json`, { cache: "no-store" });
        if (!res.ok) throw new Error("bad status");
        state.data = await res.json();
        showToast("已加载 " + weekId + " 数据");
      } catch {
        state.data =
          weekId === FALLBACK.week
            ? FALLBACK
            : {
                week: weekId,
                dateRange: "—",
                toolUpdates: FALLBACK.toolUpdates,
                modelUpdates: [],
                trends: FALLBACK.trends,
                hotContent: FALLBACK.hotContent,
                creatorRanking: []
              };
        banner.hidden = false;
        banner.innerHTML =
          "<strong>提示：</strong>未能通过 fetch 加载 JSON（常见于直接双击打开 HTML）。已显示内置 fallback；在项目根目录运行本地服务器即可加载 <code>data/</code> 下真实数据。";
        showToast("已使用内置 fallback");
      }
      const weekEl = document.getElementById("weekSelect");
      if (weekEl) weekEl.value = weekId;
      renderAll();
    }

    document.querySelectorAll(".tab").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((b) => {
          b.classList.remove("active");
          b.setAttribute("aria-selected", "false");
        });
        btn.classList.add("active");
        btn.setAttribute("aria-selected", "true");
        state.tab = btn.dataset.tab;
        document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
        document.getElementById("panel-" + state.tab).classList.add("active");
      });
    });


    loadWeek("2026-W14");
  </script>
</body>
</html>
